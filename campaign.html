<!doctype html>
<html lang="ru">
   <head>
      <meta charset="UTF-8">

      <meta
         name="viewport"
         content="width=device-width, initial-scale=1"
      >

      <meta
         name="description"
         content="Страница кампании ChainFund."
      >

      <title>Кампания — ChainFund</title>

      <link
         rel="stylesheet"
         href="css/shared.css"
      >
   </head>

   <body>
      <header id="site-header"></header>

      <main class="container content">
         <a
            class="back"
            href="index.html"
         >
            ← Назад
         </a>

         <div
            id="campaign-loading"
            class="state-message"
            role="status"
         >
            Загрузка кампании...
         </div>

         <div
            id="campaign-error"
            class="state-message error-message"
            role="alert"
            hidden
         ></div>

         <div
            id="campaign-content"
            class="campaign-layout"
            hidden
         >
            <section>
               <div id="campaign-head">
                  <div class="between">
                     <div>
                        <h1
                           id="campaign-title"
                           class="page-title"
                        ></h1>

                        <p
                           id="campaign-description"
                           class="lead"
                        ></p>
                     </div>

                     <div
                        id="campaign-status"
                     ></div>
                  </div>
               </div>

               <div class="card mt">
                  <div class="stats">
                     <div>
                        <div class="label">
                           Цель
                        </div>

                        <div
                           id="campaign-goal"
                           class="stat-value"
                        ></div>
                     </div>

                     <div>
                        <div class="label">
                           Собрано
                        </div>

                        <div
                           id="campaign-raised"
                           class="stat-value green"
                        ></div>
                     </div>

                     <div>
                        <div class="label">
                           До конца
                        </div>

                        <div
                           id="campaign-days"
                           class="stat-value"
                        ></div>
                     </div>
                  </div>

                  <div class="progress mt">
                     <span id="campaign-progress-bar"></span>
                  </div>

                  <div class="between mt mono small">
                     <span
                        id="campaign-percent"
                        class="green"
                     ></span>

                     <span
                        id="campaign-contributors"
                        class="muted"
                     ></span>
                  </div>
               </div>

               <div class="card mt">
                  <div class="label">
                     Создатель
                  </div>

                  <div
                     id="campaign-owner"
                     class="mono"
                  ></div>
               </div>

               <div
                  class="section-title"
                  style="margin-top: 32px"
               >
                  <h2>
                     ИСТОРИЯ ВЗНОСОВ
                  </h2>

                  <span class="line"></span>
               </div>

               <div
                  id="contributions-loading"
                  class="state-message"
                  role="status"
               >
                  Загрузка взносов...
               </div>

               <div
                  id="contributions-error"
                  class="state-message error-message"
                  role="alert"
                  hidden
               ></div>

               <div
                  id="contributions-empty"
                  class="state-message"
                  hidden
               >
                  Взносов пока нет.
               </div>

               <div
                  id="contributions-table"
                  class="table"
                  hidden
               >
                  <div class="tr head cols-3">
                     <div>
                        Пользователь
                     </div>

                     <div class="right">
                        Сумма
                     </div>

                     <div class="right">
                        Время
                     </div>
                  </div>

                  <div id="campaign-contributions"></div>
               </div>

               <nav
                  id="contributions-pagination"
                  class="pagination"
                  aria-label="Навигация по взносам"
                  hidden
               >
                  <button
                     id="contributions-previous-button"
                     class="button button-secondary"
                     type="button"
                  >
                     ← Назад
                  </button>

                  <span
                     id="contributions-page-information"
                     aria-live="polite"
                  >
                     Страница 1
                  </span>

                  <button
                     id="contributions-next-button"
                     class="button button-secondary"
                     type="button"
                  >
                     Вперёд →
                  </button>
               </nav>
            </section>

            <aside>
               <div class="card sticky">
                  <h2
                     class="section-title"
                     style="margin: 0 0 16px"
                  >
                     <span>
                        ВНЕСТИ СРЕДСТВА
                     </span>
                  </h2>

                  <div
                     id="contribution-error"
                     class="state-message error-message mb"
                     role="alert"
                     hidden
                  ></div>

                  <div
                     id="contribution-success"
                     class="state-message mb"
                     role="status"
                     hidden
                  ></div>

                  <div
                     id="contribution-unavailable"
                     class="muted"
                     hidden
                  ></div>

                  <form id="contribution-form">
                     <div class="field">
                        <label
                           class="label"
                           for="contribution-amount"
                        >
                           Сумма
                        </label>

                        <input
                           id="contribution-amount"
                           class="input"
                           name="amount"
                           type="number"
                           min="0"
                           step="any"
                           placeholder="0.0"
                           required
                        >
                     </div>

                     <div
                        id="wallet-information"
                        class="notice mb mono small"
                     >
                        Для взноса необходимо войти и подключить MetaMask.
                     </div>

                     <button
                        id="contribution-submit-button"
                        class="btn btn-primary"
                        type="submit"
                        style="width: 100%"
                     >
                        Внести средства
                     </button>
                  </form>

                  <a
                     id="campaign-history-link"
                     class="btn mt"
                     href="#"
                     style="width: 100%; text-align: center"
                  >
                     История выплат
                  </a>
               </div>
            </aside>
         </div>
      </main>

      <footer class="footer">
         <div class="container">
            CHAINFUND · Децентрализованная платформа краудфандинга
         </div>
      </footer>

      <script src="js/config.js"></script>
      <script src="js/helpers.js"></script>
      <script src="js/api.js"></script>
      <script src="js/auth-state.js"></script>
      <script src="js/campaign.js"></script>
   </body>
</html>
