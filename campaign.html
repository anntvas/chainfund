<!doctype html>
<html lang="ru">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <title>Кампания — ChainFund</title>
      <link rel="stylesheet" href="css/shared.css">
   </head>
   <body>
      <script src="data.js"></script><script>mountNav()</script>
      <main class="container content">
         <a class="back" href="index.html">← Назад</a>
         <div class="campaign-layout">
            <section>
               <div id="head"></div>
               <div class="card mt">
                  <div class="stats">
                     <div>
                        <div class="label">Цель</div>
                        <div class="stat-value" id="goal"></div>
                     </div>
                     <div>
                        <div class="label">Собрано</div>
                        <div class="stat-value green" id="raised"></div>
                     </div>
                     <div>
                        <div class="label">До конца</div>
                        <div class="stat-value" id="days"></div>
                     </div>
                  </div>
                  <div class="progress mt"><span id="bar"></span></div>
                  <div class="between mt mono small"><span class="green" id="percent"></span><span class="muted" id="contributors"></span></div>
               </div>
               <div class="card mt">
                  <div class="label">Создатель</div>
                  <div class="mono" id="owner"></div>
               </div>
               <div class="section-title" style="margin-top:32px">
                  <h2>ИСТОРИЯ ВЗНОСОВ</h2>
                  <span class="line"></span>
               </div>
               <div class="table">
                  <div class="tr head cols-3">
                     <div>Пользователь</div>
                     <div class="right">Сумма</div>
                     <div class="right">Время</div>
                  </div>
                  <div id="contribs"></div>
               </div>
            </section>
            <aside>
               <div class="card sticky">
                  <h2 class="section-title" style="margin:0 0 16px"><span>ВНЕСТИ СРЕДСТВА</span></h2>
                  <div id="contributeArea"></div>
               </div>
            </aside>
         </div>
      </main>
      <script src="js/campaign.js"></script>
   </body>
</html>
