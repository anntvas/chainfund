<!doctype html>
<html lang="ru">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <title>Создать кампанию — ChainFund</title>
      <link rel="stylesheet" href="css/shared.css">
   </head>
   <body>
      <script src="data.js"></script><script>mountNav()</script>
      <main class="container content">
         <div class="form-card">
            <h1 class="page-title">СОЗДАТЬ КАМПАНИЮ</h1>
            <p class="lead mb">После подтверждения MetaMask кампания появится на платформе.</p>
            <form class="card" id="createForm">
               <div class="field"><label class="label">Название проекта</label><input id="title" class="input" required placeholder="Solar Farm Delta"></div>
               <div class="field"><label class="label">Описание</label><textarea id="description" class="input" placeholder="Описание проекта..."></textarea></div>
               <div class="grid grid-2">
                  <div class="field"><label class="label">Целевая сумма (ETH)</label><input id="goal" class="input mono" type="number" min="0.1" step="0.1" required></div>
                  <div class="field"><label class="label">Дата окончания</label><input id="endDate" class="input mono" type="date" required></div>
               </div>
               <button class="btn btn-primary" style="width:100%">Создать кампанию</button>
            </form>
         </div>
      </main>
      <script src="js/create.js"></script>
   </body>
</html>
