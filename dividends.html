<!doctype html>
<html lang="ru">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <title>Дивиденды — ChainFund</title>
      <link rel="stylesheet" href="css/shared.css">
   </head>
   <body>
      <script src="data.js"></script><script>mountNav()</script>
      <main class="container content">
         <a class="back" href="dashboard.html">← Назад</a>
         <h1 class="page-title">ВЫПЛАТА ДИВИДЕНДОВ</h1>
         <p class="lead" id="subtitle"></p>
         <div class="grid grid-3 mt" id="summary"></div>
         <div class="card" style="margin-top:24px">
            <h2 class="card-title">РАСПРЕДЕЛИТЬ ДИВИДЕНДЫ</h2>
            <div class="grid grid-2">
               <div class="field"><label class="label">Сумма дивидендов (ETH)</label><input id="amount" class="input mono" type="number" min="0.01" step="0.01"></div>
               <div style="display:flex;align-items:end"><button class="btn btn-primary" style="width:100%;margin-bottom:18px" onclick="preview()">Рассчитать</button></div>
            </div>
         </div>
         <div class="section-title" style="margin-top:32px">
            <h2>ТАБЛИЦА РАСПРЕДЕЛЕНИЯ</h2>
            <span class="line"></span>
         </div>
         <div class="table">
            <div class="tr head cols-4">
               <div>Вкладчик</div>
               <div class="right">Вложено</div>
               <div class="right">Доля</div>
               <div class="right">Получит</div>
            </div>
            <div id="rows"></div>
         </div>
         <button class="btn btn-primary mt" onclick="distribute()">Подтвердить выплату в MetaMask</button>
      </main>
      <script src="js/dividends.js"></script>
   </body>
</html>
